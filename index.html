<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Enpara Beta" />
    <title>Enpara Beta</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="phone-screen">
        <section class="screen screen--active" data-screen="summary">
          <header class="topbar">
            <button
              class="icon-button icon-button--menu"
              type="button"
              aria-label="Menü"
              data-route="menu"
            >
              <span></span><span></span><span></span>
            </button>
            <h1>En Özet</h1>
            <div class="topbar__actions">
              <button
                class="icon-button icon-button--ghost"
                type="button"
                aria-label="Ana sayfa"
                data-route="summary"
              >
                <span class="home-icon"></span>
              </button>
              <button
                class="icon-button icon-button--ghost"
                type="button"
                aria-label="Bildirimler"
                data-route="notifications"
              >
                <span class="wallet-icon"></span>
              </button>
            </div>
          </header>

          <div class="segment-tabs" aria-hidden="true">
            <span></span>
            <span class="segment-tabs__active"></span>
            <span></span>
          </div>

          <section class="card account-card">
            <button class="account-row account-row--button" type="button" data-route="tl-account">
              <span>Vadesiz TL</span>
              <strong>0,00 TL</strong>
            </button>
            <button class="account-row account-row--button" type="button" data-route="usd-account">
              <span>Vadesiz USD</span>
              <strong>0,00 USD</strong>
            </button>
            <button class="account-row account-row--button muted" type="button" data-route="other-accounts">
              <span>Diğer banka hesapları</span>
              <span class="chevron">&rsaquo;</span>
            </button>
          </section>

          <section class="list-block">
            <div class="list-block__title">Teklifler ve başvurular</div>
            <button class="list-row" type="button" data-route="loan">
              <span>İhtiyaç kredisi</span>
              <span class="list-row__suffix">Başvur <span class="chevron">&rsaquo;</span></span>
            </button>
            <button class="list-row" type="button" data-route="credit-card">
              <span>Kredi kartı</span>
              <span class="list-row__suffix">Başvur <span class="chevron">&rsaquo;</span></span>
            </button>
            <button class="list-row" type="button" data-route="ekpara">
              <span>Ekpara (KMH)</span>
              <span class="list-row__suffix">Başvur <span class="chevron">&rsaquo;</span></span>
            </button>
            <button class="list-row" type="button" data-route="findeks">
              <span>Findeks risk raporu</span>
              <span class="list-row__suffix">Başvur <span class="chevron">&rsaquo;</span></span>
            </button>
          </section>

          <section class="list-block">
            <div class="list-block__title">Son işlemlerim</div>
            <button class="history-item history-item--button" type="button" data-route="outgoing-transfer">
              <div>
                <small>Bugün</small>
                <p>Giden Transfer - Miraç Özbağ, Bireysel Ödeme...</p>
              </div>
              <strong>-190,00 TL</strong>
            </button>
            <button class="history-item history-item--button" type="button" data-route="incoming-transfer">
              <div>
                <small>Bugün</small>
                <p>Gelen Transfer - MELIKE LACIN, Bireysel Ödeme</p>
              </div>
              <strong>+190,00 TL</strong>
            </button>
          </section>

          <section class="list-block">
            <div class="list-block__title">Bekleyen işlemlerim</div>
            <button class="pending-card" type="button" data-route="swift-detail">
              <div class="pending-card__icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none">
                  <path d="M18 10h28M18 54h28M22 10c0 12 20 10 20 22S22 42 22 54M42 10c0 12-20 10-20 22s20 10 20 22" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="pending-card__content">
                <strong>+521.670,00 TL Gelen SWIFT |</strong>
                <p>Enpara.com SWIFT işlemi | Gerçekleşmesi beklenen ileri tarihli SWIFT işleminiz.</p>
              </div>
              <span class="chevron">&rsaquo;</span>
            </button>
          </section>
        </section>

        <section class="screen app-page" data-screen="page">
          <header class="detail-topbar app-page__topbar">
            <button
              class="icon-button icon-button--ghost"
              type="button"
              aria-label="Geri"
              data-action="back"
            >
              <span class="back-icon"></span>
            </button>
            <h1 id="page-title"></h1>
            <button
              class="icon-button icon-button--ghost"
              type="button"
              aria-label="Ana sayfa"
              data-route="summary"
            >
              <span class="home-icon"></span>
            </button>
          </header>

          <section class="app-page__hero" id="page-hero"></section>
          <section class="app-page__body" id="page-body"></section>
          <footer class="bottom-actions app-page__footer" id="page-footer"></footer>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
